<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCV API Reference</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0c10; --surface: #111318; --surface2: #181c24; --border: #1e2330; --accent: #4ade80; --accent2: #facc15; --text: #e2e8f0; --muted: #64748b; --code: #94a3b8; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  body::after { content: ''; position: fixed; top: -100px; left: 50%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(74,222,128,0.045) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  .back-nav { position: relative; z-index: 1; padding: 16px 40px; border-bottom: 1px solid var(--border); }
  .back-nav a { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted); text-decoration: none; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s; }
  .back-nav a:hover { color: var(--accent); }
  header { position: relative; z-index: 1; padding: 48px 40px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .logo-area h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; letter-spacing: -2px; line-height: 1; background: linear-gradient(135deg, #4ade80 0%, #facc15 55%, #fb923c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .logo-area .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }
  .stats { display: flex; gap: 24px; }
  .stat { text-align: right; }
  .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
  .search-bar { position: relative; z-index: 1; padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search-input { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; padding: 10px 16px; outline: none; transition: border-color 0.2s; }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }
  .filter-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; padding: 8px 14px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { background: var(--surface2); color: var(--text); border-color: var(--muted); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); }
  main { position: relative; z-index: 1; padding: 32px 40px; display: flex; flex-direction: column; gap: 40px; }
  .category { display: flex; flex-direction: column; gap: 16px; }
  .cat-header { display: flex; align-items: center; gap: 16px; }
  .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cat-title { font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; letter-spacing: 3px; text-transform: uppercase; font-weight: 700; }
  .cat-line { flex: 1; height: 1px; background: var(--border); }
  .cat-count { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; overflow: hidden; position: relative; }
  .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--cat-color); transform: scaleY(0); transition: transform 0.2s; transform-origin: bottom; }
  .card:hover::before, .card.open::before { transform: scaleY(1); }
  .card:hover { border-color: var(--cat-color); background: var(--surface2); transform: translateY(-1px); }
  .card.open { border-color: var(--cat-color); }
  .card-top { padding: 14px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .card-name { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; font-weight: 500; color: var(--cat-color); word-break: break-all; line-height: 1.4; }
  .card-toggle { font-size: 0.65rem; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; margin-top: 2px; }
  .card.open .card-toggle { transform: rotate(180deg); }
  .card-brief { font-size: 0.75rem; color: var(--muted); padding: 0 16px 12px; line-height: 1.5; }
  .card-detail { display: none; border-top: 1px solid var(--border); padding: 14px 16px; flex-direction: column; gap: 10px; }
  .card.open .card-detail { display: flex; }
  .detail-label { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
  .code-block { background: var(--bg); border: 1px solid var(--border); padding: 10px 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--code); line-height: 1.7; overflow-x: auto; white-space: pre; }
  .code-block .kw { color: #c792ea; } .code-block .fn { color: #82aaff; } .code-block .st { color: #c3e88d; } .code-block .nm { color: #f78c6c; } .code-block .cm { color: #546e7a; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; padding: 3px 8px; border: 1px solid; text-transform: uppercase; letter-spacing: 1px; }
  .hidden { display: none !important; }
  footer { position: relative; z-index: 1; padding: 24px 40px; border-top: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; display: flex; gap: 16px; justify-content: space-between; flex-wrap: wrap; }
  @media (max-width: 600px) { .back-nav, header, .search-bar, main, footer { padding-left: 20px; padding-right: 20px; } .cards-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="back-nav"><a href="index.html">← Back to index</a></div>
<header>
  <div class="logo-area">
    <h1>OpenCV API</h1>
    <div class="subtitle">Computer Vision Command Reference</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="total-count">0</div><div class="stat-label">Commands</div></div>
    <div class="stat"><div class="stat-num" id="cat-count">0</div><div class="stat-label">Categories</div></div>
  </div>
</header>
<div class="search-bar">
  <input class="search-input" type="text" placeholder="Search commands... (e.g. threshold, contour, morphology)" id="search" />
  <div class="filter-btns" id="filter-btns"><button class="filter-btn active" data-filter="all">All</button></div>
</div>
<main id="main"></main>
<footer>
  <span>Click any card to expand with usage examples</span>
  <span>OpenCV 4.x · Frank Lato</span>
</footer>
<script>
const CATEGORIES = [
  {
    id: "io",
    name: "I/O & Display",
    color: "#4ade80",
    commands: [
      { name: "cv2.imread() / imwrite()", brief: "Load and save images — note: OpenCV uses BGR channel order, not RGB", code: `import cv2

img = cv2.imread('image.png')           # BGR uint8
img = cv2.imread('image.png', cv2.IMREAD_GRAYSCALE)
img = cv2.imread('image.png', cv2.IMREAD_UNCHANGED) # keep alpha

cv2.imwrite('output.png', img)
cv2.imwrite('output.jpg', img, [cv2.IMWRITE_JPEG_QUALITY, 95])`, tags: ["io", "fundamental"] },
      { name: "cv2.imshow() / waitKey()", brief: "Display an image in a window (desktop / local env)", code: `cv2.imshow('Window Title', img)
key = cv2.waitKey(0)          # wait indefinitely
key = cv2.waitKey(30)         # 30ms — use in video loops
cv2.destroyAllWindows()

# Press 'q' to quit
if key == ord('q'):
    cv2.destroyAllWindows()`, tags: ["display"] },
      { name: "BGR ↔ RGB / Grayscale conversion", brief: "Convert between OpenCV BGR and standard RGB/gray formats", code: `# OpenCV → matplotlib/PyTorch (RGB)
img_rgb = cv2.cvtColor(img, cv2.COLOR_BGR2RGB)

# To grayscale
gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)

# To HSV (useful for color-based segmentation)
hsv = cv2.cvtColor(img, cv2.COLOR_BGR2HSV)

# Grayscale → 3-channel
img3 = cv2.cvtColor(gray, cv2.COLOR_GRAY2BGR)`, tags: ["color", "fundamental"] },
      { name: "cv2.VideoCapture()", brief: "Read video files or webcam streams frame by frame", code: `cap = cv2.VideoCapture('video.mp4')
cap = cv2.VideoCapture(0)          # webcam index 0

while cap.isOpened():
    ret, frame = cap.read()
    if not ret: break
    # process frame...
    cv2.imshow('frame', frame)
    if cv2.waitKey(1) == ord('q'): break

cap.release()
cv2.destroyAllWindows()`, tags: ["video", "io"] },
    ]
  },
  {
    id: "transforms",
    name: "Geometric Transforms",
    color: "#facc15",
    commands: [
      { name: "cv2.resize()", brief: "Resize an image to a target size or scale factor", code: `img_resized = cv2.resize(img, (width, height))
img_resized = cv2.resize(img, (224, 224))

# By scale factor
img_half = cv2.resize(img, None, fx=0.5, fy=0.5)

# Interpolation methods
cv2.resize(img, (w,h), interpolation=cv2.INTER_LINEAR)   # bilinear
cv2.resize(img, (w,h), interpolation=cv2.INTER_NEAREST)  # nearest
cv2.resize(img, (w,h), interpolation=cv2.INTER_CUBIC)    # bicubic`, tags: ["transform", "fundamental"] },
      { name: "cv2.flip() / rotate()", brief: "Mirror or rotate an image", code: `# Flip
cv2.flip(img, 0)   # vertical flip
cv2.flip(img, 1)   # horizontal flip
cv2.flip(img, -1)  # both

# Rotate 90/180/270
cv2.rotate(img, cv2.ROTATE_90_CLOCKWISE)
cv2.rotate(img, cv2.ROTATE_180)
cv2.rotate(img, cv2.ROTATE_90_COUNTERCLOCKWISE)`, tags: ["transform"] },
      { name: "cv2.warpAffine() / warpPerspective()", brief: "Apply affine or perspective transformations", code: `h, w = img.shape[:2]
# Rotation matrix
M = cv2.getRotationMatrix2D((w/2, h/2), angle=15, scale=1.0)
rotated = cv2.warpAffine(img, M, (w, h))

# Translation
T = np.float32([[1, 0, tx], [0, 1, ty]])
shifted = cv2.warpAffine(img, T, (w, h))

# Perspective warp
M = cv2.getPerspectiveTransform(src_pts, dst_pts)
warped = cv2.warpPerspective(img, M, (w, h))`, tags: ["transform"] },
      { name: "cv2.copyMakeBorder()", brief: "Pad an image with borders of various types", code: `# Zero padding
padded = cv2.copyMakeBorder(img, top=10, bottom=10,
                             left=10, right=10,
                             borderType=cv2.BORDER_CONSTANT,
                             value=0)
# Reflect padding
padded = cv2.copyMakeBorder(img, 10, 10, 10, 10,
                             cv2.BORDER_REFLECT)`, tags: ["transform", "padding"] },
    ]
  },
  {
    id: "filtering",
    name: "Filtering & Blurring",
    color: "#fb923c",
    commands: [
      { name: "cv2.GaussianBlur()", brief: "Gaussian smoothing — the standard blur for noise reduction", code: `blurred = cv2.GaussianBlur(img, ksize=(5, 5), sigmaX=0)
blurred = cv2.GaussianBlur(img, (15, 15), sigmaX=2.0)
# ksize must be odd and positive`, tags: ["filter", "fundamental"] },
      { name: "cv2.medianBlur() / bilateralFilter()", brief: "Median blur for salt-and-pepper noise; bilateral preserves edges", code: `# Median: great for salt-and-pepper noise
med = cv2.medianBlur(img, ksize=5)

# Bilateral: blurs but preserves edges
bil = cv2.bilateralFilter(img, d=9,
                           sigmaColor=75, sigmaSpace=75)`, tags: ["filter"] },
      { name: "cv2.filter2D()", brief: "Apply any custom kernel via 2D convolution", code: `kernel = np.array([[-1,-1,-1],
                   [-1, 8,-1],
                   [-1,-1,-1]])  # Laplacian
sharpened = cv2.filter2D(img, ddepth=-1, kernel=kernel)

# Sharpening kernel
k = np.array([[0,-1,0],[-1,5,-1],[0,-1,0]])
sharp = cv2.filter2D(img, -1, k)`, tags: ["filter", "convolution"] },
      { name: "cv2.Sobel() / Laplacian()", brief: "Gradient-based edge detection operators", code: `# Sobel derivatives
sobelx = cv2.Sobel(gray, cv2.CV_64F, 1, 0, ksize=3)
sobely = cv2.Sobel(gray, cv2.CV_64F, 0, 1, ksize=3)
magnitude = np.sqrt(sobelx**2 + sobely**2)

# Laplacian
lap = cv2.Laplacian(gray, cv2.CV_64F)`, tags: ["filter", "edge"] },
    ]
  },
  {
    id: "thresholding",
    name: "Thresholding & Morphology",
    color: "#c084fc",
    commands: [
      { name: "cv2.threshold()", brief: "Binarize a grayscale image using a fixed or automatic threshold", code: `# Fixed threshold
ret, binary = cv2.threshold(gray, 127, 255, cv2.THRESH_BINARY)
ret, inv    = cv2.threshold(gray, 127, 255, cv2.THRESH_BINARY_INV)

# Otsu's method (auto threshold)
ret, otsu = cv2.threshold(gray, 0, 255,
                           cv2.THRESH_BINARY + cv2.THRESH_OTSU)
print(f'Otsu threshold: {ret}')`, tags: ["threshold", "segmentation"] },
      { name: "cv2.adaptiveThreshold()", brief: "Per-region thresholding — handles uneven illumination", code: `binary = cv2.adaptiveThreshold(
    gray, 255,
    cv2.ADAPTIVE_THRESH_GAUSSIAN_C,
    cv2.THRESH_BINARY,
    blockSize=11,   # must be odd
    C=2             # subtracted from mean
)`, tags: ["threshold", "segmentation"] },
      { name: "cv2.morphologyEx()", brief: "Morphological operations: erosion, dilation, opening, closing", code: `kernel = cv2.getStructuringElement(cv2.MORPH_ELLIPSE, (5,5))

eroded  = cv2.erode(binary, kernel, iterations=1)
dilated = cv2.dilate(binary, kernel, iterations=1)
opened  = cv2.morphologyEx(binary, cv2.MORPH_OPEN, kernel)
closed  = cv2.morphologyEx(binary, cv2.MORPH_CLOSE, kernel)
grad    = cv2.morphologyEx(binary, cv2.MORPH_GRADIENT, kernel)`, tags: ["morphology", "segmentation"] },
      { name: "cv2.inRange()", brief: "Create a binary mask for pixels within a color range — used in color segmentation", code: `# HSV-based color segmentation
hsv = cv2.cvtColor(img, cv2.COLOR_BGR2HSV)
lower = np.array([35, 50, 50])   # green lower
upper = np.array([85, 255, 255]) # green upper
mask = cv2.inRange(hsv, lower, upper)
result = cv2.bitwise_and(img, img, mask=mask)`, tags: ["threshold", "segmentation", "color"] },
    ]
  },
  {
    id: "contours",
    name: "Contours & Drawing",
    color: "#67e8f9",
    commands: [
      { name: "cv2.findContours()", brief: "Find object boundaries in a binary image", code: `contours, hierarchy = cv2.findContours(
    binary, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE
)
# RETR_EXTERNAL: outer contours only
# RETR_TREE: full hierarchy
# CHAIN_APPROX_SIMPLE: compress segments`, tags: ["contour", "fundamental"] },
      { name: "cv2.drawContours() / contourArea()", brief: "Draw contours on an image and measure their properties", code: `canvas = img.copy()
cv2.drawContours(canvas, contours, -1, (0,255,0), 2)

# Filter by area
for c in contours:
    area = cv2.contourArea(c)
    if area > 500:
        cv2.drawContours(canvas, [c], -1, (255,0,0), 3)

peri = cv2.arcLength(c, closed=True)`, tags: ["contour"] },
      { name: "cv2.boundingRect() / minEnclosingCircle()", brief: "Fit bounding shapes around contours", code: `x, y, w, h = cv2.boundingRect(c)
cv2.rectangle(img, (x,y), (x+w,y+h), (0,255,0), 2)

(cx, cy), radius = cv2.minEnclosingCircle(c)
cv2.circle(img, (int(cx),int(cy)), int(radius), (0,0,255), 2)

rect = cv2.minAreaRect(c)  # rotated bounding rect`, tags: ["contour", "shape"] },
      { name: "cv2.rectangle() / circle() / putText()", brief: "Draw shapes and text annotations on images", code: `# Rectangle: pt1, pt2, color (BGR), thickness
cv2.rectangle(img, (x1,y1), (x2,y2), (0,255,0), 2)

# Circle: center, radius, color, thickness (-1=filled)
cv2.circle(img, (cx,cy), radius, (255,0,0), -1)

# Text
cv2.putText(img, 'Label', (x,y),
            cv2.FONT_HERSHEY_SIMPLEX,
            fontScale=0.8, color=(255,255,255),
            thickness=2)`, tags: ["drawing"] },
    ]
  },
  {
    id: "features",
    name: "Feature Detection",
    color: "#f9a8d4",
    commands: [
      { name: "cv2.Canny()", brief: "Canny edge detector — the most widely used edge detection method", code: `edges = cv2.Canny(gray, threshold1=50, threshold2=150)
edges = cv2.Canny(gray, 100, 200)

# Pre-blur for noise reduction
blurred = cv2.GaussianBlur(gray, (5,5), 0)
edges = cv2.Canny(blurred, 50, 150)`, tags: ["edge", "feature"] },
      { name: "cv2.goodFeaturesToTrack()", brief: "Shi-Tomasi corner detection — fast keypoint detector", code: `corners = cv2.goodFeaturesToTrack(
    gray, maxCorners=100,
    qualityLevel=0.01,
    minDistance=10
)
corners = np.int0(corners)
for c in corners:
    x, y = c.ravel()
    cv2.circle(img, (x,y), 3, (0,255,0), -1)`, tags: ["feature", "keypoint"] },
      { name: "SIFT / ORB descriptors", brief: "Scale-invariant feature detection and description for matching", code: `# ORB (fast, patent-free)
orb = cv2.ORB_create()
kp, desc = orb.detectAndCompute(gray, None)
img_kp = cv2.drawKeypoints(img, kp, None)

# SIFT (most robust)
sift = cv2.SIFT_create()
kp, desc = sift.detectAndCompute(gray, None)`, tags: ["feature", "descriptor"] },
      { name: "cv2.HoughCircles()", brief: "Detect circles in a grayscale image — useful for cell detection", code: `circles = cv2.HoughCircles(
    gray, cv2.HOUGH_GRADIENT,
    dp=1, minDist=20,
    param1=50, param2=30,
    minRadius=5, maxRadius=50
)
if circles is not None:
    circles = np.uint16(np.around(circles))
    for c in circles[0]:
        cv2.circle(img, (c[0],c[1]), c[2], (0,255,0), 2)`, tags: ["feature", "shape", "cell"] },
    ]
  }
];

function highlight(code) {
  return code
    .replace(/\b(import|from|as|def|return|for|in|if|else|True|False|None|not|while|break|print)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(cv2|cap|img|gray|binary|hsv|mask|result|contours|edges|corners|orb|sift|kp|desc|circles)\b/g, '<span class="fn">$1</span>')
    .replace(/(#.+)/g, '<span class="cm">$1</span>')
    .replace(/('[\w./_\-\s]*'|"[\w./_\-\s]*")/g, '<span class="st">$1</span>')
    .replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="nm">$1</span>');
}

function buildUI() {
  const main = document.getElementById('main');
  const filterBtns = document.getElementById('filter-btns');
  let totalCmds = 0;
  CATEGORIES.forEach(cat => {
    totalCmds += cat.commands.length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn'; btn.dataset.filter = cat.id; btn.textContent = cat.name;
    filterBtns.appendChild(btn);
    const section = document.createElement('div');
    section.className = 'category'; section.dataset.catId = cat.id;
    section.innerHTML = `<div class="cat-header"><div class="cat-dot" style="background:${cat.color}"></div><div class="cat-title" style="color:${cat.color}">${cat.name}</div><div class="cat-line"></div><div class="cat-count">${cat.commands.length} commands</div></div><div class="cards-grid"></div>`;
    const grid = section.querySelector('.cards-grid');
    cat.commands.forEach(cmd => {
      const card = document.createElement('div');
      card.className = 'card'; card.style.setProperty('--cat-color', cat.color);
      card.dataset.name = cmd.name.toLowerCase(); card.dataset.tags = cmd.tags.join(' '); card.dataset.catId = cat.id;
      const tagHTML = cmd.tags.map(t => `<span class="tag" style="color:${cat.color};border-color:${cat.color}33">${t}</span>`).join('');
      card.innerHTML = `<div class="card-top"><div class="card-name">${cmd.name}</div><div class="card-toggle">▼</div></div><div class="card-brief">${cmd.brief}</div><div class="card-detail"><div><div class="detail-label">Usage</div><div class="code-block">${highlight(cmd.code)}</div></div><div class="tags">${tagHTML}</div></div>`;
      card.addEventListener('click', () => card.classList.toggle('open'));
      grid.appendChild(card);
    });
    main.appendChild(section);
  });
  document.getElementById('total-count').textContent = totalCmds;
  document.getElementById('cat-count').textContent = CATEGORIES.length;
  filterBtns.addEventListener('click', e => {
    if (!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    const filter = e.target.dataset.filter;
    document.querySelectorAll('.category').forEach(sec => sec.classList.toggle('hidden', filter !== 'all' && sec.dataset.catId !== filter));
  });
  document.getElementById('search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
    document.querySelectorAll('.category').forEach(s => s.classList.remove('hidden'));
    if (!q) { document.querySelectorAll('.card').forEach(c => c.classList.remove('hidden')); return; }
    document.querySelectorAll('.card').forEach(card => {
      card.classList.toggle('hidden', !(card.dataset.name.includes(q) || card.dataset.tags.includes(q) || card.querySelector('.card-brief').textContent.toLowerCase().includes(q)));
    });
    document.querySelectorAll('.category').forEach(sec => {
      sec.classList.toggle('hidden', ![...sec.querySelectorAll('.card')].some(c => !c.classList.contains('hidden')));
    });
  });
}
buildUI();
</script>
</body>
