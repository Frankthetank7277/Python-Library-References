<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyTorch API Reference</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2330;
    --accent: #ee4b2b;
    --accent2: #f97316;
    --blue: #3b82f6;
    --green: #22c55e;
    --purple: #a855f7;
    --yellow: #eab308;
    --teal: #14b8a6;
    --pink: #ec4899;
    --text: #e2e8f0;
    --muted: #64748b;
    --code: #94a3b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid noise background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo-area h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    background: linear-gradient(135deg, #ee4b2b 0%, #f97316 50%, #eab308 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-area .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .stats {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: right;
  }

  .stat-num {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .search-bar {
    position: relative;
    z-index: 1;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    padding: 10px 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }

  .filter-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    padding: 8px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--muted);
  }

  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  main {
    position: relative;
    z-index: 1;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  .category {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .cat-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cat-title {
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .cat-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .cat-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    overflow: hidden;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--cat-color);
    transform: scaleY(0);
    transition: transform 0.2s;
    transform-origin: bottom;
  }

  .card:hover::before, .card.open::before {
    transform: scaleY(1);
  }

  .card:hover {
    border-color: var(--cat-color);
    background: var(--surface2);
    transform: translateY(-1px);
  }

  .card.open {
    border-color: var(--cat-color);
  }

  .card-top {
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .card-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--cat-color);
    word-break: break-all;
    line-height: 1.4;
  }

  .card-toggle {
    font-size: 0.65rem;
    color: var(--muted);
    flex-shrink: 0;
    transition: transform 0.2s;
    margin-top: 2px;
  }

  .card.open .card-toggle {
    transform: rotate(180deg);
  }

  .card-brief {
    font-size: 0.75rem;
    color: var(--muted);
    padding: 0 16px 12px;
    line-height: 1.5;
  }

  .card-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    flex-direction: column;
    gap: 10px;
  }

  .card.open .card-detail {
    display: flex;
  }

  .detail-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .code-block {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 10px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--code);
    line-height: 1.7;
    overflow-x: auto;
    white-space: pre;
  }

  .code-block .kw { color: #c792ea; }
  .code-block .fn { color: #82aaff; }
  .code-block .st { color: #c3e88d; }
  .code-block .nm { color: #f78c6c; }
  .code-block .cm { color: #546e7a; }

  .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    padding: 3px 8px;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .hidden { display: none !important; }

  footer {
    position: relative;
    z-index: 1;
    padding: 24px 40px;
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
    display: flex;
    gap: 16px;
    justify-content: space-between;
    flex-wrap: wrap;
  }

  .back-nav {
    position: relative;
    z-index: 1;
    padding: 16px 40px;
    border-bottom: 1px solid var(--border);
  }

  .back-nav a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: color 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .back-nav a:hover { color: var(--accent); }

  @media (max-width: 600px) {
    header, main, .search-bar, footer, .back-nav { padding-left: 20px; padding-right: 20px; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="back-nav">
  <a href="index.html">← Back to index</a>
</div>

<header>
  <div class="logo-area">
    <h1>PyTorch API</h1>
    <div class="subtitle">Deep Learning Command Reference</div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="total-count">0</div>
      <div class="stat-label">Commands</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="cat-count">0</div>
      <div class="stat-label">Categories</div>
    </div>
  </div>
</header>

<div class="search-bar">
  <input class="search-input" type="text" placeholder="Search commands... (e.g. conv2d, backward, optim)" id="search" />
  <div class="filter-btns" id="filter-btns">
    <button class="filter-btn active" data-filter="all">All</button>
  </div>
</div>

<main id="main"></main>

<footer>
  <span>Click any card to expand with usage examples</span>
  <span>PyTorch 2.x · Frank Lato</span>
</footer>

<script>
const CATEGORIES = [
  {
    id: "tensors",
    name: "Tensor Ops",
    color: "#3b82f6",
    commands: [
      { name: "torch.tensor()", brief: "Create a tensor from data", code: `x = torch.tensor([[1.0, 2.0], [3.0, 4.0]])
x = torch.tensor(np.array([1,2,3]), dtype=torch.float32)`, tags: ["creation", "fundamental"] },
      { name: "torch.zeros / ones / rand", brief: "Initialize tensors with fixed or random values", code: `z = torch.zeros(3, 4)         # all zeros
o = torch.ones(2, 5)           # all ones
r = torch.rand(8, 8)           # uniform [0,1)
n = torch.randn(16, 16)        # std normal`, tags: ["init", "creation"] },
      { name: "torch.arange / linspace", brief: "Create evenly spaced tensors", code: `a = torch.arange(0, 10, step=2)     # [0,2,4,6,8]
l = torch.linspace(0.0, 1.0, 100)  # 100 pts`, tags: ["creation", "indexing"] },
      { name: ".view() / .reshape()", brief: "Reshape a tensor without copying data (view requires contiguous)", code: `x = torch.randn(8, 8)
flat = x.view(64)           # 1D
b = x.view(4, 16)           # new shape
r = x.reshape(2, 4, 8)     # safe reshape`, tags: ["shape"] },
      { name: ".permute() / .transpose()", brief: "Reorder tensor dimensions", code: `# NCHW → NHWC (e.g. for matplotlib)
x = torch.randn(1, 3, 224, 224)

# 2D transpose
w = w.transpose(0, 1)`, tags: ["shape", "dims"] },
      { name: ".squeeze() / .unsqueeze()", brief: "Remove or add dimensions of size 1", code: `x = torch.randn(1, 64, 1)

x.unsqueeze(1)        # → (1, 1, 64, 1)`, tags: ["shape", "dims"] },
      { name: "torch.cat / torch.stack", brief: "Concatenate or stack tensors along a dimension", code: `a, b = torch.randn(4,8), torch.randn(4,8)

torch.clamp(x, min=0, max=1)`, tags: ["math"] },
      { name: "torch.matmul / @", brief: "Matrix multiplication — the backbone of linear layers", code: `y = torch.matmul(W, x)   # explicit
y = W @ x                # shorthand
# batched mm
y = torch.bmm(A, B)     # (B,n,m) × (B,m,k)`, tags: ["math", "linear"] },
      { name: ".to() / .cuda() / .cpu()", brief: "Move tensors between devices", code: `device = 'cuda' if torch.cuda.is_available() else 'cpu'
x = x.to(device)
x = x.cuda()    # → GPU
x = x.cpu()     # → CPU
x = x.to(dtype=torch.float16)`, tags: ["device"] },
    ]
  },
  {
    id: "autograd",
    name: "Autograd",
    color: "#ee4b2b",
    commands: [
      { name: "requires_grad=True", brief: "Flag a tensor to track gradients during forward pass", code: `x = torch.tensor([1.0, 2.0], requires_grad=True)

      { name: ".backward()", brief: "Compute gradients via backpropagation", code: `loss = criterion(output, target)

loss.backward(torch.ones_like(loss))`, tags: ["grad", "training"] },

      { name: "torch.autograd.grad()", brief: "Compute gradients of outputs w.r.t. inputs explicitly", code: `grads = torch.autograd.grad(

    inputs=model.parameters(),
    create_graph=True   # for 2nd order
)`, tags: ["grad", "advanced"] },
    ]

  {
    id: "nn",

      { name: "nn.Conv2d(in, out, k)", brief: "2D convolution — primary building block for CNNs", code: `conv = nn.Conv2d(

      { name: "nn.ReLU / Sigmoid / Tanh", brief: "Non-linear activation functions", code: `act = nn.ReLU()           # max(0,x)

function highlight(code) {
  return code
    .replace(/\b(import|from|class|def|return|for|in|with|if|else|True|False|None|not)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(torch|nn|F|optim|transforms|datasets|DataLoader|Dataset)\b/g, '<span class="fn">$1</span>')
    .replace(/(#.+)/g, '<span class="cm">$1</span>')
    .replace(/('[\w./_\-\s]*'|"[\w./_\-\s]*")/g, '<span class="st">$1</span>')
    .replace(/\b(\d+(?:\.\d+)?(?:e-?\d+)?)\b/g, '<span class="nm">$1</span>');
}

function buildUI() {
  const main = document.getElementById('main');
  const filterBtns = document.getElementById('filter-btns');
  let totalCmds = 0;

  CATEGORIES.forEach(cat => {
    totalCmds += cat.commands.length;

    // Filter button
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = cat.id;
    btn.textContent = cat.name;
    filterBtns.appendChild(btn);

    // Category section
    const section = document.createElement('div');
    section.className = 'category';
    section.dataset.catId = cat.id;

    section.innerHTML = `
      <div class="cat-header">
        <div class="cat-dot" style="background:${cat.color}"></div>
        <div class="cat-title" style="color:${cat.color}">${cat.name}</div>
        <div class="cat-line"></div>
        <div class="cat-count">${cat.commands.length} commands</div>
      </div>
      <div class="cards-grid"></div>
    `;

    const grid = section.querySelector('.cards-grid');

    cat.commands.forEach(cmd => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--cat-color', cat.color);
      card.dataset.name = cmd.name.toLowerCase();
      card.dataset.tags = cmd.tags.join(' ');
      card.dataset.catId = cat.id;

      const tagHTML = cmd.tags.map(t =>
        `<span class="tag" style="color:${cat.color};border-color:${cat.color}33">${t}</span>`
      ).join('');

      card.innerHTML = `
        <div class="card-top">
          <div class="card-name">${cmd.name}</div>
          <div class="card-toggle">▼</div>
        </div>
        <div class="card-brief">${cmd.brief}</div>
        <div class="card-detail">
          <div>
            <div class="detail-label">Usage</div>
            <div class="code-block">${highlight(cmd.code)}</div>
          </div>
          <div class="tags">${tagHTML}</div>
        </div>
      `;

      card.addEventListener('click', () => {
        card.classList.toggle('open');
      });

      grid.appendChild(card);
    });

    main.appendChild(section);
  });

  document.getElementById('total-count').textContent = totalCmds;
  document.getElementById('cat-count').textContent = CATEGORIES.length;

  // Filter logic
  filterBtns.addEventListener('click', e => {
    if (!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    const filter = e.target.dataset.filter;
    document.querySelectorAll('.category').forEach(sec => {
      if (filter === 'all' || sec.dataset.catId === filter) {
        sec.classList.remove('hidden');
      } else {
        sec.classList.add('hidden');
      }
    });
  });

  // Search logic
  document.getElementById('search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    // Reset filter buttons
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');

    document.querySelectorAll('.category').forEach(sec => {
      sec.classList.remove('hidden');
    });

    if (!q) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('hidden'));
      return;
    }

    document.querySelectorAll('.card').forEach(card => {
      const match = card.dataset.name.includes(q) ||
                    card.dataset.tags.includes(q) ||
                    card.querySelector('.card-brief').textContent.toLowerCase().includes(q);
      card.classList.toggle('hidden', !match);
    });

    // Hide empty categories
    document.querySelectorAll('.category').forEach(sec => {
      const visible = [...sec.querySelectorAll('.card')].some(c => !c.classList.contains('hidden'));
      sec.classList.toggle('hidden', !visible);
    });
  });
}

buildUI();
</script>
